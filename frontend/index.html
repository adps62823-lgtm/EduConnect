<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f0f1a" />
    <meta name="description" content="EduConnect — The social platform for serious students" />

    <!-- Open Graph -->
    <meta property="og:title" content="EduConnect" />
    <meta property="og:description" content="Study together. Learn faster. Compete harder." />
    <meta property="og:type" content="website" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>EduConnect</title>

    <style>
      /* Critical CSS — prevents flash of unstyled content */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:       #0f0f1a;
        --surface:  #16162a;
        --border:   #2a2a3d;
        --primary:  #6366f1;
        --accent:   #f59e0b;
        --text:     #e8e8f0;
        --muted:    #6b6b8a;
        --font-main: 'Sora', sans-serif;
        --font-mono: 'Space Mono', monospace;
      }

      html, body, #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: var(--font-main);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a2a3d; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #6366f1; }

      /* Loading screen shown before React mounts */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        background: #0f0f1a;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash-logo {
        font-family: 'Sora', sans-serif;
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #6366f1, #f59e0b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.05em;
      }
      #splash-sub {
        font-size: 0.8rem;
        color: #6b6b8a;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      .splash-dots {
        display: flex;
        gap: 6px;
      }
      .splash-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #6366f1;
        animation: bounce 1.2s infinite ease-in-out;
      }
      .splash-dot:nth-child(2) { animation-delay: 0.2s; background: #8b5cf6; }
      .splash-dot:nth-child(3) { animation-delay: 0.4s; background: #f59e0b; }
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* Selection color */
      ::selection {
        background: #6366f140;
        color: #e8e8f0;
      }
    </style>
  </head>

  <body>
    <!-- Splash screen (hidden once React mounts) -->
    <div id="splash">
      <div id="splash-logo">EduConnect</div>
      <div id="splash-sub">Study Together · Learn Faster</div>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Remove splash screen once React has painted
      window.__hideSplash = function () {
        const splash = document.getElementById('splash')
        if (splash) {
          splash.classList.add('fade-out')
          setTimeout(() => splash.remove(), 450)
        }
      }
    </script>
  </body>
</html>
