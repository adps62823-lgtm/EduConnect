services:
  - type: web
    name: educonnect-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend

    # ── Persistent disk ─────────────────────────────────────
    # This is the CRITICAL part — without this, every restart
    # wipes your data/ and uploads/ folders completely.
    # The disk mounts at /var/data and survives deploys + restarts.
    disk:
      name: educonnect-data
      mountPath: /var/data
      sizeGB: 1          # free tier allows 1 GB — upgrade when needed

    envVars:
      # Point both stores at the persistent disk mount
      - key: DATA_DIR
        value: /var/data/db

      - key: UPLOAD_DIR
        value: /var/data/uploads

      # Security — generate once with:
      # python -c "import secrets; print(secrets.token_hex(32))"
      # Then set it in Render dashboard → Environment instead of here
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure value on first deploy

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"        # 7 days

      # Set this to your Vercel frontend URL
      - key: FRONTEND_URL
        value: https://my-edu-connect.vercel.app

      - key: APP_NAME
        value: EduConnect

      - key: APP_VERSION
        value: "1.0.0"

      - key: DEBUG
        value: "false"

      - key: RESTRICT_TO_SCHOOL
        value: "false"

      - key: ALLOWED_EMAIL_DOMAIN
        value: ""

      # Max upload size in MB
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
